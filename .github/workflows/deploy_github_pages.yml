name: Deploy GitHub Pages

on:
  push:
    branches:
      - pages

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@44a6e6beabd48582f863aeeb6cb2151cc1716697 # v1.0.13
        with:
          source: ./
          destination: ./_site

      - name: Add Mermaid
        env:
          MERMAID_HTML_TAG: |
            <script type='module'>
              import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
              mermaid.initialize({ startOnLoad: false });
              await mermaid.run({
                querySelector: 'pre > code.language-mermaid',
              });
            </script>
        run: |
          MERMAID_HTML_TAG="${MERMAID_HTML_TAG//$'\n'/}"
          grep -rl "language-mermaid" _site | while IFS= read -r file; do
            echo "Adding Mermaid to $file"
            sudo sed -i "s|</head>|$MERMAID_HTML_TAG\n</head>|" "$file"
          done

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: _site/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
